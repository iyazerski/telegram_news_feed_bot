<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>News Feed</title>
    <link rel="stylesheet" href="/app/styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/app/app.js" defer></script>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">NewsIY</p>
          <h1>Your News Feed</h1>
          <p class="lead">Follow the channels you care about and get fresh posts gathered into one clean feed.</p>
        </div>
      </header>

      <section class="panel" aria-labelledby="channels-heading">
        <div class="section-heading">
          <div>
            <h2 id="channels-heading">Subscriptions</h2>
            <p>Add the channels you love. Remove anything that no longer earns a place in your feed.</p>
          </div>
        </div>

        <form class="form-row" id="add-channel-form">
          <label class="field-label" for="channel-input">Add a channel</label>
          <div class="input-action">
            <input id="channel-input" name="channel" autocomplete="off" placeholder="@example or t.me/example" />
            <button type="submit">Add</button>
          </div>
        </form>

        <div class="channel-list" id="channel-list"></div>
      </section>

      <section class="panel" aria-labelledby="settings-heading">
        <div class="section-heading">
          <div>
            <h2 id="settings-heading">Update Rhythm</h2>
            <p>Choose how often your feed looks for fresh posts.</p>
          </div>
        </div>

        <div class="preset-row" role="group" aria-label="Update rhythm">
          <button type="button" data-interval="1m">1m</button>
          <button type="button" data-interval="5m">5m</button>
          <button type="button" data-interval="15m">15m</button>
          <button type="button" data-interval="1h">1h</button>
        </div>
      </section>

      <p class="message" id="message" role="status"></p>
    </main>
  </body>
</html>
