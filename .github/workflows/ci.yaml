name: CI

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install development dependencies
        run: uv sync --locked --group dev

      - name: Run pre-commit
        run: uv run pre-commit run --all-files
