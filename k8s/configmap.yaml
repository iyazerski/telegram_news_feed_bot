apiVersion: v1
kind: ConfigMap
metadata:
  name: telegram-news-config
  labels:
    app: telegram-news
data:
  TELEGRAM_NEWS_LOG_LEVEL: "INFO"
  TELEGRAM_NEWS_PUBLIC_HOST: "__PUBLIC_HOST__"
  TELEGRAM_NEWS_BOT_UPDATE_MODE: "webhook"
  TELEGRAM_NEWS_BOT_WEBHOOK_LISTEN_HOST: "0.0.0.0"
  TELEGRAM_NEWS_BOT_WEBHOOK_PATH: "/telegram/webhook"
  TELEGRAM_NEWS_BOT_WEBHOOK_PORT: "8000"
  TELEGRAM_NEWS_NATS_URL: "nats://telegram-news-nats:4222"
  TELEGRAM_NEWS_NATS_SUBJECT: "telegram.posts.discovered"
  TELEGRAM_NEWS_NATS_QUEUE: "telegram-dispatchers"
  TELEGRAM_NEWS_DEFAULT_POLL_INTERVAL_SECONDS: "300"
  TELEGRAM_NEWS_POLLER_HTTP_TIMEOUT_SECONDS: "10"
  TELEGRAM_NEWS_TELEGRAM_HTTP_TIMEOUT_SECONDS: "20"
  TELEGRAM_NEWS_TELEGRAM_GET_UPDATES_TIMEOUT_SECONDS: "50"
  TELEGRAM_NEWS_TELEGRAM_GET_UPDATES_IDLE_SECONDS: "2"
