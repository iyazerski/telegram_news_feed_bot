apiVersion: apps/v1
kind: Deployment
metadata:
  name: telegram-news-bot
  labels:
    app: telegram-news
    component: bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telegram-news
      component: bot
  template:
    metadata:
      labels:
        app: telegram-news
        component: bot
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: bot
          image: __BOT_IMAGE__
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          envFrom:
            - configMapRef:
                name: telegram-news-config
            - secretRef:
                name: telegram-news-database-secrets
            - secretRef:
                name: telegram-news-bot-secrets
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsGroup: 10001
            runAsNonRoot: true
            runAsUser: 10001
---
