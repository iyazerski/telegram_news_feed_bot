apiVersion: v1
kind: Service
metadata:
  name: telegram-news-nats
  labels:
    app: telegram-news-nats
spec:
  type: ClusterIP
  selector:
    app: telegram-news-nats
  ports:
    - name: client
      port: 4222
      targetPort: client
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telegram-news-nats
  labels:
    app: telegram-news-nats
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: telegram-news-nats
  template:
    metadata:
      labels:
        app: telegram-news-nats
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nats
          image: nats:2.12-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: client
              containerPort: 4222
          readinessProbe:
            tcpSocket:
              port: client
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: client
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
